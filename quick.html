<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <style>
    h3 { font-size: 50px; text-align: center; margin-bottom: 50px; }
  </style>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px 20px;
      background: #f5f5f5;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      font-size: 20px;
      padding: 15px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
  
<!-- LIFF 初始化 + 登錄送出 -->
<script>  
  const LIFF_IDqq = "2008096451-cORglo9A";
  const API_URL = "https://script.google.com/macros/s/AKfycbwxqIKuk4VqHeib3Mi_xxE6yS5R8V55wyiQVIS6VgF6PEnNa93lVSoBBiX4OYksDuaiUw/exec";
  const VERSION = "V29_#260129"; 
</script>  
  
<body>

  <h3>💲非<span style="color: red;">速</span>不可.[<span id="version">V</span>]</h3>

  <input
    id="quickText"
    type="text"
    placeholder="-32 全家 現金 食"
  >

  <button onclick="submitQuick()">
    送出
  </button>

  <script>

    function submitQuick() {

      const text = document.getElementById("quickText").value.trim();

      if (!text) {
        alert(
          "請輸入快速記帳內容\n\n" +
          "格式：金額 店家 付款 分類\n\n" +
          "例如：\n" +
          "-34 全家 現金 食"
        );
        return;
      }

        // 用空白切割
        const parts = text.split(/\s+/);
      
        // 必須剛好 4 個欄位
        if (parts.length !== 4) {
      
          alert(
            "快速記帳格式錯誤！\n\n" +
            "必須輸入 4 個欄位：\n" +
            "金額 店家 付款 分類\n\n" +
            "例如：\n" +
            "-34 全家 現金 食\n\n" +
            "目前輸入：\n" +
            text
          );
      
          return;
        }
      
        // 檢查金額是否為數字
        if (isNaN(Number(parts[0]))) {
      
          alert(
            "金額格式錯誤！\n\n" +
            "第一欄必須是數字\n\n" +
            "例如：\n" +
            "-34 全家 現金 食"
          );
      
          return;
        }

      // 原本的 LIFF URL
      const liffUrl =
        "https://mini0214.github.io/account.test/liff.html?quick="
        + encodeURIComponent(text);

      // 直接開啟原本 LIFF
      window.location.href = liffUrl;
    }

  </script>

</body>
</html>
