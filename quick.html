<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>快速記帳</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px 20px;
      background: #f5f5f5;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      font-size: 20px;
      padding: 15px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <h2>快速記帳</h2>

  <input
    id="quickText"
    type="text"
    placeholder="-32 全家 現金 食"
  >

  <button onclick="submitQuick()">
    送出
  </button>

  <script>

    function submitQuick() {

      const text = document.getElementById("quickText").value.trim();

      if (!text) {
        alert("請輸入記帳內容;用空格區分");
        return;
      }

      // 原本的 LIFF URL
      const liffUrl =
        "https://mini0214.github.io/account.test/liff.html?quick="
        + encodeURIComponent(text);

      // 直接開啟原本 LIFF
      window.location.href = liffUrl;
    }

  </script>

</body>
</html>
