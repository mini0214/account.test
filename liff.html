<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>零用金支出帳簿</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>  <!-- 引入 Chart.js 在 <head> 區塊中加入 CDN：-->

  <style>
    body { font-family: Arial, sans-serif; padding: 50px; }
    h2 { font-size: 40px; text-align: center; margin-bottom: 40px; }
    h3 { font-size: 50px; text-align: center; margin-bottom: 50px; }
    label { font-size: 50px; font-weight: bold; display: inline-block; /*比較不會被擠下去 */ margin-top: 25px; white-space: nowrap; }
    input, select  { font-size: 50px; padding: 25px; width: 70%; margin-top: 5px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    .form-row, .form-block { display: flex; align-items: center; margin: 20px 0; white-space: nowrap; /* ✅ 關鍵：不允許自動換行 */ }     
    button { font-size: 50px; padding: 25px; border-radius: 8px; background-color: #4CAF50; color: white; border: none; width: 100%; margin-top: 25px; transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.97); box-shadow: inset 0 2px 5px rgba(0,0,0,0.2); }
    .toggle-btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 30px; opacity: 0.6; transition: opacity 0.2s, box-shadow 0.2s; }
    #btnIncome { background: #000080; color: white; }
    #btnPayout { background: #f44336; color: white; }
    .active { opacity: 1; box-shadow: 0 0 6px rgba(0,0,0,0.3); }
    <!--storelist欄位-->
    .input-wrapper { position: relative; flex: 1; }
    #store { width: 100%; padding: 25px; font-size: 50px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    #suggestions { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; max-height: 200px; overflow-y: auto; display: none; z-index: 1000; }
    #suggestions div { padding: 20px; font-size: 50px; cursor: pointer; }
    #suggestions div:hover { background-color: #eee; }
    .total { margin-top: 10px; font-size: 60px; font-weight: bold; color: #d9534f; }
    #loadingMsg { display: none; font-size: 40px; color: red; text-align: center; margin-top: 20px; }    
  </style>
</head>
<body>

  <h3>💰非<span style="color: red;">記</span>不可.[<span id="version">V</span>]</h3>

  <!-- 登錄表單 -->
  <form id="expenseForm">
    
    <div class="form-row">
      <label for="date">日期：</label>
      <input type="date" id="date" placeholder="選填">
    </div>    
  
    <div class="form-row store-row">
      <label for="store">店家：</label>
      <div class="input-wrapper">
        <input type="text" id="store" placeholder="選填;可邊輸入邊選擇店家">
        <div id="suggestions"></div>
      </div>
    </div>

    <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
      <button type="button" id="btnIncome" class="toggle-btn">收入</button>
      <button type="button" id="btnPayout" class="toggle-btn active">支出</button>
    
      <input type="number" id="income" placeholder="請輸入收入金額" style="width:550px; color:blue; display:none;" step="0.01">
      <input type="number" id="payout" placeholder="請輸入支出金額" style="width:550px; color:red; display:inline-block;" step="0.01">
    </div>   

    <div class="form-row">
      <label for="currency">幣別：</label>
      <select id="currency" required>
        <option value="">請選擇幣別</option>
      </select>
    </div>

    <div class="form-row">
      <label for="payment">付款：</label>
      <select id="payment" required>
        <option value="">請選擇付款</option>
      </select>
    </div>

    <div class="form-block">
      <label for="type">分類：</label>
      <select id="type" required>
        <option value="">請選擇分類</option>
      </select>
    </div>

    <div class="form-row">
      <label for="store">附註：</label>
      <input type="text" id="note" placeholder="選填">
    </div>

    <div class="form-row">
      <label for="store">備註：</label>
      <input type="text" id="memo" placeholder="選填">
    </div>

    <button type="submit" id="submitBtn">送出</button>
    <div id="loadingMsg" style="display:none; font-size:40px; color:red; text-align:center; margin-top:20px;">
      ⏳ 資料送出中，請稍候...
    </div>
  </form>

  <div style="text-align: center; margin-top: 20px; padding: 20px; border-top: 1px solid #ccc;"> 
      <div class="links">
        <h2>
          <a href="liff.html" target="_blank" style="margin: 0 10px;">💰非<span style="color: red;">記</span>不可</a> 
          <a href="query.html" target="_blank" style="margin: 0 10px;">🔍非<span style="color: blue;">看</span><span>/</span><span style="color: green;">匯</span>不可</a> 
          <a href="other.html" target="_blank" style="margin: 0 10px;">⚙️非<span style="color: gray;">設</span>不可</a>
        </h2>
      </div>

      <div style="font-size: 20px; text-align: center; color: #666; margin-top: 20px;">
          Copyright © Betty Yi. All Right Reserved.
      </div>
  </div>
  
    <script>      
      const btnIncome = document.getElementById("btnIncome");
      const btnPayout = document.getElementById("btnPayout");
      const income = document.getElementById("income");
      const payout = document.getElementById("payout");
    
      function resetButtons() {
        btnIncome.classList.remove("active");
        btnPayout.classList.remove("active");
      }
    
      btnIncome.addEventListener("click", () => {
        resetButtons();
        btnIncome.classList.add("active");
    
        income.style.display = "inline-block";
        income.value = "";
        payout.style.display = "none";
        payout.value = "";
      });
    
      btnPayout.addEventListener("click", () => {
        resetButtons();
        btnPayout.classList.add("active");
    
        payout.style.display = "inline-block";
        payout.value = "";
        income.style.display = "none";
        income.value = "";
      });
    </script>

<!-- LIFF 初始化 + 登錄送出 -->
<script>  
  const LIFF_IDa = "2008096451-3DobjEw8";
  const API_URL = "https://script.google.com/macros/s/AKfycbwxqIKuk4VqHeib3Mi_xxE6yS5R8V55wyiQVIS6VgF6PEnNa93lVSoBBiX4OYksDuaiUw/exec";
  const VERSION = "V29_#260129"; 

  let storeList = []; 
  let userProfile = null;
  window.otherList = null; 

  // ✅ 記錄是否為快速記帳
  let isQuickInput = false;

  const getEl = (id) => document.getElementById(id);

  // --- 初始化啟動 ---
  async function initApp(){
    try {
  
      getEl("version").textContent = VERSION;
      getEl("date").valueAsDate = new Date();
  
      await Promise.all([
  
        liff.init({ liffId: LIFF_IDa }).then(async () => {

          console.log("LIFF 初始化成功");

          console.log("isInClient:", liff.isInClient());
          console.log("isLoggedIn:", liff.isLoggedIn());
  
          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }
  
          userProfile = await liff.getProfile();

          console.log("使用者:", userProfile);
        }),  
        loadListData(),  
        loadStoreList()
      ]);
  
      // 所有下拉選單載入完成後
      loadQuickData();
  
    } catch (err) {
  
      console.error("初始化失敗：", err);
  
    }
  }

  // --- 載入清單 (幣別/分類/付款) 保持原功能 ---
  async function loadListData() {
    try {
      const res = await fetch(`${API_URL}?type=query&command=清單`);
      const data = await res.json();
      if (!data.ok || !data.list) return;
      window.otherList = data.list;
      const list = data.list;

      const currencySelect = getEl("currency");
      list.currency.forEach(c => c.allowDecimal = c.exchange.toString().includes('.'));

      function renderCurrencyOptions(hasDecimal = false) {
        const currentVal = currencySelect.value;
        currencySelect.innerHTML = '<option value="">請選擇幣別</option>';
        list.currency.forEach(c => {
          if (hasDecimal && !c.allowDecimal) return;
          const opt = new Option(`${c.name}:${c.exchange}`, c.exchange);
          opt.dataset.name = c.name;
          currencySelect.add(opt);
        });
        currencySelect.value = currentVal;
      }
      renderCurrencyOptions(false);

      const checkDecimal = () => renderCurrencyOptions(getEl("income").value.includes(".") || getEl("payout").value.includes("."));
      getEl("income").addEventListener("input", checkDecimal);
      getEl("payout").addEventListener("input", checkDecimal);

      getEl("type").innerHTML = '<option value="">請選擇分類</option>';
      list.type.forEach(t => getEl("type").add(new Option(t.name, t.name)));

      getEl("payment").innerHTML = '<option value="">請選擇付款</option>';
      list.payment.forEach(p => getEl("payment").add(new Option(p.name, p.name)));
    } catch (err) { console.error("清單載入失敗", err); }
  }

  async function loadStoreList() {
    try {
      const res = await fetch(`${API_URL}?type=query&command=店家`);
      const data = await res.json();
      if (data.ok) storeList = data.storeList;
    } catch (err) { console.error("店家載入失敗", err); }
  }
  
// ============================================
// 快速記帳：讀取 URL ?quick=
// 例如：
// liff.html?quick=-12%20全家%20現金%20食
// ============================================
function loadQuickData() {

  const params = new URLSearchParams(window.location.search);
  const quick = params.get("quick");

  if (!quick) return;

  // ✅ 確認是快速記帳
  isQuickInput = true;

  console.log("收到快速記帳資料：", quick);

  const parts = quick.trim().split(/\s+/);

  if (parts.length < 4) {
    console.warn("快速記帳格式錯誤");
    return;
  }

  const amount = parts[0];
  const store = parts[1];
  const payment = parts[2];
  const type = parts[3];

  // =========================
  // 1. 支出 / 收入
  // =========================

  if (Number(amount) < 0) {

    document.getElementById("btnPayout").click();

    const payoutInput = document.getElementById("payout");
    payoutInput.value = Math.abs(Number(amount));

    payoutInput.dispatchEvent(
      new Event("input", { bubbles: true })
    );

  } else {

    document.getElementById("btnIncome").click();

    const incomeInput = document.getElementById("income");
    incomeInput.value = Number(amount);

    incomeInput.dispatchEvent(
      new Event("input", { bubbles: true })
    );
  }

  // =========================
  // 2. 店家
  // =========================

  const storeInput = document.getElementById("store");

  if (storeInput) {
    storeInput.value = store;

    // 不觸發 input
    // 避免店家自動分類功能干擾快速輸入
    storeInput.dispatchEvent(
      new Event("change", { bubbles: true })
    );
  }

  // =========================
  // 3. 幣別：預設台幣
  // =========================

  const currencySelect =
    document.getElementById("currency");

  if (currencySelect) {

    // 找名稱為「台幣」的選項
    const option = [...currencySelect.options]
      .find(o => o.dataset.name === "台幣");

    if (option) {
      currencySelect.value = option.value;
    }
  }

  // =========================
  // 4. 付款
  // =========================

  const paymentSelect =
    document.getElementById("payment");

  if (paymentSelect) {
    paymentSelect.value = payment;
  }

  // =========================
  // 5. 分類
  // =========================

  const typeSelect =
    document.getElementById("type");

  if (typeSelect) {
    typeSelect.value = type;
  }

  // =========================
  // 6. 快速輸入完成後自動送出
  // =========================

  setTimeout(() => {

    console.log("快速記帳資料已填入，準備自動送出");

    document.getElementById("expenseForm").requestSubmit();

  }, 500);
}
  
  // --- 店家提示邏輯 ---
  getEl("store").addEventListener("input", () => {
    const val = getEl("store").value.toLowerCase();
    const sugg = getEl("suggestions");
    sugg.innerHTML = "";
    if (!val) { sugg.style.display = "none"; return; }
    const matches = storeList.filter(s => s.store && s.store.toLowerCase().includes(val));
    if (matches.length === 0) { sugg.style.display = "none"; return; }
    matches.forEach(m => {
      const div = document.createElement("div");
      div.textContent = m.store + (m.type ? `（${m.type}）` : "");
      div.onclick = () => {
      
        getEl("store").value = m.store;
        sugg.style.display = "none";
      
        // ✅ 如果是快速記帳，而且已經有分類
        // 就不要用店家的分類覆蓋
        if (m.type && !isQuickInput) {
          getEl("type").value = m.type;
      
          if (!getEl("type").value) {
            getEl("type").add(new Option(m.type, m.type));
            getEl("type").value = m.type;
          }
        }
      };
      sugg.appendChild(div);
    });
    sugg.style.display = "block";
    const rect = getEl("store").getBoundingClientRect();
    Object.assign(sugg.style, { width: rect.width + "px", top: (rect.bottom + window.scrollY) + "px", left: (rect.left + window.scrollX) + "px" });
  });

  //簡單的計時器（Timer）
    let sendingTimer;
    let sendingSeconds = 0;
  
    // ----------------------------------------------------
    // ✅ 表單送出：增加秒數顯示功能 (完整整合版)
    // ----------------------------------------------------
    getEl("expenseForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const submitBtn = getEl("submitBtn");
      const loadingMsg = getEl("loadingMsg");
  
      // --- 啟動計時邏輯 ---
      clearInterval(sendingTimer); 
      sendingSeconds = 0;
      submitBtn.disabled = true;
      submitBtn.innerText = "處理中...";
      
      loadingMsg.style.display = "block";
      loadingMsg.innerText = `⏳ 資料送出中，請稍候...${sendingSeconds}s`;
  
      sendingTimer = setInterval(() => {
          sendingSeconds++;
          loadingMsg.innerText = `⏳ 資料送出中，請稍候...${sendingSeconds}s`;
      }, 1000);
  
      try {
          const profile = userProfile || await liff.getProfile();
          const income = Number(getEl("income").value || 0);
          const payout = Number(getEl("payout").value || 0);
          const currency = Number(getEl("currency").value);
          const exchange = getEl("currency").selectedOptions[0]?.dataset.name || "";
  
          const payload = {
              version: VERSION, userId: profile.userId, displayName: profile.displayName,
              inputDate: getEl("date").value, store: getEl("store").value,
              income, payout, currency, amount: Math.round((income - payout) * currency),
              payment: getEl("payment").value, type: getEl("type").value,
              note: getEl("note").value, memo: getEl("memo").value,
              createdAt: new Date(Date.now() + 8*3600000).toISOString().replace("T"," ").split(".")[0],
              exchange: exchange
          };
  
          // 1. 先執行儲存
          const saveRes = await fetch(API_URL, { 
              method: "POST", 
              body: JSON.stringify(payload) 
          });
          if (!saveRes.ok) throw new Error("儲存資料失敗");
  
          // 2. 儲存完成後，才發送查詢請求
          const totalRes = await fetch(`${API_URL}?type=query&command=總額&user=${encodeURIComponent(profile.displayName)}`);
          if (!totalRes.ok) throw new Error("查詢總額失敗");
  
          // 3. 取得資料
          const totalData = await totalRes.json();
          const thisTotal = totalData?.thisMonth?.total ?? 0;
          const lastTotal = totalData?.lastMonth?.total ?? 0;
          const changeText = totalData?.changeText || "";
          const changetxt = totalData?.changetxt || "";
          const types = totalData?.types || [];
          const payments = totalData?.payments || [];
  
          // ✅ 4. 構建訊息
          let msg =
            `非記不可.記帳成功！\n` +
            `👤 記帳者：${payload.displayName}\n` +
            `📆 日期：${payload.inputDate}\n` +
            `🏠 店家：${payload.store || " "}\n` +
            `💰 收支：${payload.payout ? `-${payload.payout}` : payload.income}\n` +
            `💰 幣別：${payload.exchange}  ${payload.currency}\n` +
            `💰 金額：${payload.amount}\n` +
            `💳 付款：${payload.payment}\n` +
            `📂 分類：${payload.type}\n` +
            `📝 附註：${payload.note || " "}\n` +
            `📝 備註：${payload.memo || " "}\n\n` +
            `📆 本期總額：💰${thisTotal}\n`;
  
          if (lastTotal !== 0) {
            msg += `📆 上期總額：💰${lastTotal}\n🧮 總額佔比：${changeText}\n📢 ${changetxt}`;
          }
  
          // 💳 付款統計
          if (payments?.length && window.otherList?.payment) {
            msg += `\n\n💳 付款本期總額:\n`;
            const sortedP = [...window.otherList.payment].sort((a, b) => (Number(a.number) || 0) - (Number(b.number) || 0));
            sortedP.forEach(ref => {
              const found = payments.find(p => p.payment === ref.name);
              if (found) msg += `▶︎ ${ref.name}：💰${found.thisTotal}\n`;
            });
          }
  
          // 📂 分類統計
          if (types?.length && window.otherList?.type) {
            msg += `\n📂 分類本期總額:\n`;
            const sortedT = [...window.otherList.type].sort((a, b) => (Number(a.number) || 0) - (Number(b.number) || 0));
            sortedT.forEach(ref => {
              const found = types.find(t => t.type === ref.name);
              if (found) msg += `▶︎ ${ref.name}：💰${found.thisTotal}\n`;
            });
          }
  
          // ============================================
          // 5. 顯示訊息
          // ============================================
                              
          if (liff.isInClient()) {
          
              try {
          
                  // 1. 傳送訊息
                  await liff.sendMessages([
                      {
                          type: "text",
                          text: msg
                      }
                  ]);
          
                  console.log("LINE 訊息傳送成功");
          
                  // 2. 顯示完成訊息
                  alert(msg);
          
                  // 3. 關閉 LIFF
                  liff.closeWindow();
          
              } catch (err) {
          
                  console.error("LINE 訊息傳送失敗", err);
          
                  alert(
                      "❌ LINE 訊息傳送失敗\n\n" +
                      err.message
                  );
              }
          
          } else {
          
              alert(msg);
          
              window.location.href = "quick.html";
          }
  
      } catch (err) {
          console.error(err);
          alert("❌ 發生錯誤：" + err.message);
      } finally {
          // --- 無論成功或失敗，停止計時並恢復 UI ---
          clearInterval(sendingTimer);
          loadingMsg.style.display = "none";
          submitBtn.disabled = false;
          submitBtn.innerText = "送出";
      }
    });
  
    window.addEventListener("load", initApp);
</script>
</body>
</html>
